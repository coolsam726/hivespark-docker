# ─────────────────────────────────────────────────────────────────────────────
# Spark 3.5.1 defaults — Java 11 / Hadoop 3.3.6 / Hive 4.0 metastore
# ─────────────────────────────────────────────────────────────────────────────

# Default master for interactive/notebook sessions (standalone cluster)
# Override per-job: spark-submit --master yarn ...
spark.master                            spark://spark-master:7077

# ─── HDFS integration ────────────────────────────────────────────────────────
spark.hadoop.fs.defaultFS               hdfs://namenode:9000

# ─── Hive Metastore ──────────────────────────────────────────────────────────
spark.hadoop.hive.metastore.uris        thrift://hive-metastore:9083
spark.sql.catalogImplementation         hive
spark.sql.warehouse.dir                 hdfs://namenode:9000/user/hive/warehouse

# ─── Event logging (for History Server) ──────────────────────────────────────
spark.eventLog.enabled                  true
spark.eventLog.dir                      hdfs://namenode:9000/spark-logs
spark.history.fs.logDirectory           hdfs://namenode:9000/spark-logs

# ─── Serialization ───────────────────────────────────────────────────────────
spark.serializer                        org.apache.spark.serializer.KryoSerializer

# ─── Driver / executor defaults ─────────────────────────────────────────────
# Fits within ~6 GB left for Spark standalone after YARN takes 10 GB
spark.driver.memory                     2g
spark.executor.memory                   4g
spark.executor.cores                    2

# ─── Adaptive Query Execution (Spark 3.x) ────────────────────────────────────
spark.sql.adaptive.enabled              true
