# =============================================================================
# Hue configuration for the hivespark dev stack
# Mounted into the container at /usr/share/hue/desktop/conf/z-hue.ini
# =============================================================================

[desktop]
  secret_key=localdevsecretkey_hivespark_change_in_production

  # Disable apps not present in this stack
  app_blacklist=search,hbase,impala,pig,sqoop,zookeeper,oozie,jobsub,indexer

  [[database]]
    # SQLite — adequate for local development
    engine=sqlite3
    name=/var/lib/hue/hue.db

# ── HiveServer2 (Beeswax / Hive editor) ──────────────────────────────────────
[beeswax]
  hive_server_host=hiveserver2
  hive_server_port=10000
  hive_transport_mode=binary
  server_conn_timeout=120

# ── Hadoop / HDFS / YARN ─────────────────────────────────────────────────────
[hadoop]
  [[hdfs_clusters]]
    [[[default]]]
      fs_defaultfs=hdfs://namenode:9000
      webhdfs_url=http://namenode:9870/webhdfs/v1

  [[yarn_clusters]]
    [[[default]]]
      resourcemanager_host=resourcemanager
      resourcemanager_port=8032
      resourcemanager_api_url=http://resourcemanager:8088
      history_server_api_url=http://historyserver:19888
